name: Flutter quality

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart run build_runner build
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
